  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
  #     - CHROMA_PERSIST_DIR=/app/chroma_db
  #     - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/auto_bidder_dev
  #     - SESSION_STATE_TTL_HOURS=24
  #     - DRAFT_RETENTION_HOURS=24
  #     - MAX_DRAFT_SIZE_KB=1000
  #     - ENABLE_WORKFLOW_ANALYTICS=true
  #   volumes:
  #     - ./backend:/app
  #     - chromadb_data:/app/chroma_db
  #   depends_on:
  #     - postgres
  #     - chromadb
  #   networks:
  #     - auto-bidder-network
  #   command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js Frontend (optional - usually run with npm run dev)
